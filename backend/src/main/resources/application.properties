spring.application.name=backend
server.port=8080

# Database Configuration (Defaults to in-memory H2, uses PostgreSQL if environment variables are provided)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:runtrack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console for easy inspection if needed
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Allow H2 frame options so console can load in iframe
spring.headers.frame-options=sameorigin

# Gemini API Key configuration
gemini.api.key=${GEMINI_API_KEY:}

# Groq API Key configuration
groq.api.key=${GROQ_API_KEY:}

