spring.application.name=backend
server.port=8080

# Persistent H2 database stored in a folder called 'data' inside backend
spring.datasource.url=jdbc:h2:file:./data/runtrack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console for easy inspection if needed
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Allow H2 frame options so console can load in iframe
spring.headers.frame-options=sameorigin

# Gemini API Key configuration
gemini.api.key=${GEMINI_API_KEY:}
