spring.application.name=backend
server.port=8080

# Default to in-memory H2 database for local development to prevent startup crashes in production when no variables are set
spring.datasource.url=jdbc:h2:mem:runtrack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# Allow Spring Boot to auto-detect the database driver class (H2 locally, Postgres in production)
# spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console for easy inspection if needed
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Allow H2 frame options so console can load in iframe
spring.headers.frame-options=sameorigin

# Gemini API Key configuration
gemini.api.key=${GEMINI_API_KEY:}

# Groq API Key configuration
groq.api.key=${GROQ_API_KEY:}

